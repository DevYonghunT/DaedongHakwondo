services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: daedonghakwondo-postgis
    environment:
      POSTGRES_DB: hakwondo
      POSTGRES_USER: hakwondo
      POSTGRES_PASSWORD: hakwondo
    ports:
      - "5434:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
