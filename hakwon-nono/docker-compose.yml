services:
  postgres:
    image: kartoza/postgis:15-3.4
    container_name: hakwonnono-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: hakwonnono
      POSTGRES_PASS: hakwonnono
      POSTGRES_DBNAME: hakwonnono
      ALLOW_IP_RANGE: "0.0.0.0/0"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
